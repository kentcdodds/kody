<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Generated UI Shell Test (iframe)</title>
		<style>
			body {
				font-family: system-ui;
				padding: 1rem;
			}

			iframe {
				border: 1px solid #ccc;
				width: 100%;
				min-height: 560px;
			}

			.stack {
				display: grid;
				gap: 1rem;
			}

			.host-chat {
				margin-top: 0.75rem;
				padding: 0.75rem;
				border: 1px solid #ddd;
				border-radius: 0.5rem;
				background: #f9f9f9;
				font-size: 0.95rem;
			}

			.host-chat h3 {
				margin: 0 0 0.5rem;
				font-size: 0.95rem;
			}

			.host-chat ul {
				margin: 0;
				padding-left: 1.25rem;
			}

			.host-chat li {
				margin: 0.2rem 0;
			}
		</style>
	</head>
	<body>
		<h1>Generated UI Shell Test</h1>
		<div class="stack">
			<section>
				<h2>Default iframe</h2>
				<iframe
					id="generated-default"
					src="/dev/generated-ui"
					title="Generated UI Shell"
				></iframe>
				<div class="host-chat" data-host-chat="generated-default">
					<h3>Host chat (default iframe)</h3>
					<ul data-chat-log></ul>
				</div>
				<div class="host-chat" data-host-links="generated-default">
					<h3>Host links (default iframe)</h3>
					<ul data-link-log></ul>
				</div>
			</section>
			<section>
				<h2>Sandboxed iframe (MCP host style)</h2>
				<p>
					Uses <code>sandbox="allow-scripts"</code> to match ChatGPT/MCP Jam
					widget restrictions.
				</p>
				<iframe
					id="generated-sandboxed"
					src="/dev/generated-ui"
					sandbox="allow-scripts"
					title="Generated UI Shell (sandboxed)"
				></iframe>
				<div class="host-chat" data-host-chat="generated-sandboxed">
					<h3>Host chat (sandboxed iframe)</h3>
					<ul data-chat-log></ul>
				</div>
				<div class="host-chat" data-host-links="generated-sandboxed">
					<h3>Host links (sandboxed iframe)</h3>
					<ul data-link-log></ul>
				</div>
			</section>
		</div>
		<script>
			;(() => {
				const latestProtocolVersion = '2026-01-26'
				const renderDataType = 'ui-lifecycle-iframe-render-data'
				const initializedNotificationMethod = 'ui/notifications/initialized'
				const frameById = {
					'generated-default': document.getElementById('generated-default'),
					'generated-sandboxed': document.getElementById('generated-sandboxed'),
				}
				const frameState = new Map()

				const demoCode =
					new URLSearchParams(window.location.search).get('code') ??
					`
<main>
	<h1>Inline app</h1>
	<button type="button" data-send-message>Send message</button>
	<button type="button" data-open-link>Open docs</button>
	<button type="button" data-fullscreen>Fullscreen</button>
	<button type="button" data-run-code>Run code</button>
	<pre data-execute-result hidden></pre>
</main>
<script>
	const sendButton = document.querySelector('[data-send-message]')
	const linkButton = document.querySelector('[data-open-link]')
	const fullscreenButton = document.querySelector('[data-fullscreen]')
	const runCodeButton = document.querySelector('[data-run-code]')
	const executeResult = document.querySelector('[data-execute-result]')
	sendButton?.addEventListener('click', () => {
		window.kodyWidget.sendMessage('Inline widget says hello')
	})
	linkButton?.addEventListener('click', () => {
		window.kodyWidget.openLink('https://example.com/docs')
	})
	fullscreenButton?.addEventListener('click', async () => {
		const nextMode = await window.kodyWidget.toggleFullscreen()
		const status = document.createElement('p')
		status.textContent = 'Mode: ' + nextMode
		document.body.append(status)
	})
	runCodeButton?.addEventListener('click', async () => {
		const result = await window.kodyWidget.executeCode(
			'async () => ({ greeting: "Hello from execute" })',
		)
		if (!executeResult) return
		executeResult.hidden = false
		executeResult.textContent = JSON.stringify(result, null, 2)
	})
<\/script>
					`.trim()

				function resolveFrameId(sourceWindow) {
					for (const [frameId, iframe] of Object.entries(frameById)) {
						if (iframe && iframe.contentWindow === sourceWindow) {
							return frameId
						}
					}
					return null
				}

				function getOrCreateState(frameId) {
					const existing = frameState.get(frameId)
					if (existing) return existing
					const next = { initialized: false }
					frameState.set(frameId, next)
					return next
				}

				function appendHostChat(frameId, text) {
					const container = document.querySelector(
						`[data-host-chat="${frameId}"] [data-chat-log]`,
					)
					if (!container) return
					const item = document.createElement('li')
					item.setAttribute('data-chat-message', '')
					item.textContent = text
					container.append(item)
				}

				function appendHostLink(frameId, url) {
					const container = document.querySelector(
						`[data-host-links="${frameId}"] [data-link-log]`,
					)
					if (!container) return
					const item = document.createElement('li')
					item.setAttribute('data-open-link', '')
					item.textContent = url
					container.append(item)
				}

				window.addEventListener('message', (event) => {
					const frameId = resolveFrameId(event.source)
					if (!frameId) return

					const message = event.data
					if (!message || typeof message !== 'object') return

					if (message.type === 'ui-request-render-data') {
						event.source.postMessage(
							{
								type: renderDataType,
								payload: {
									renderData: {
										theme: 'light',
										toolOutput: {
											widget: 'generated_ui',
											renderSource: 'inline_code',
											title: 'Sandbox shell test',
											description: 'Sandbox shell render payload.',
											runtime: 'html',
											sourceCode: demoCode,
										},
									},
								},
							},
							'*',
						)
						return
					}

					if (message.jsonrpc !== '2.0') return

					if (message.method === 'ui/initialize') {
						const requestedVersion = message.params?.protocolVersion
						if (requestedVersion !== latestProtocolVersion) {
							event.source.postMessage(
								{
									jsonrpc: '2.0',
									id: message.id,
									error: {
										code: -32602,
										message: `Unsupported protocol version: ${requestedVersion}`,
									},
								},
								'*',
							)
							return
						}

						const state = getOrCreateState(frameId)
						state.initialized = true
						event.source.postMessage(
							{
								jsonrpc: '2.0',
								id: message.id,
								result: {
									protocolVersion: latestProtocolVersion,
									hostInfo: {
										name: 'mcp-jam-simulator',
										version: '1.0.0',
									},
									hostCapabilities: {
										message: {
											text: {},
										},
										openLinks: {},
										serverTools: {
											listChanged: false,
										},
									},
									hostContext: {
										theme: 'light',
										displayMode: 'inline',
										availableDisplayModes: ['inline', 'fullscreen'],
									},
								},
							},
							'*',
						)
						return
					}

					if (message.method === initializedNotificationMethod) {
						return
					}

					if (message.method === 'ui/message') {
						const state = getOrCreateState(frameId)
						const firstContent = Array.isArray(message.params?.content)
							? message.params.content[0]
							: null
						const text =
							firstContent &&
							typeof firstContent === 'object' &&
							firstContent.type === 'text' &&
							typeof firstContent.text === 'string'
								? firstContent.text
								: null

						if (
							!state.initialized ||
							message.params?.role !== 'user' ||
							!text
						) {
							event.source.postMessage(
								{
									jsonrpc: '2.0',
									id: message.id,
									result: { isError: true },
								},
								'*',
							)
							return
						}

						appendHostChat(frameId, text)
						event.source.postMessage(
							{
								jsonrpc: '2.0',
								id: message.id,
								result: {},
							},
							'*',
						)
						return
					}

					if (message.method === 'tools/call') {
						if (message.params?.name === 'ui_load_app_source') {
							event.source.postMessage(
								{
									jsonrpc: '2.0',
									id: message.id,
									result: {
										structuredContent: {
											app_id: 'demo-app',
											title: 'Loaded app',
											description: 'Loaded from app-only tool.',
											runtime: 'html',
											code: demoCode,
										},
									},
								},
								'*',
							)
							return
						}
						if (message.params?.name === 'execute') {
							event.source.postMessage(
								{
									jsonrpc: '2.0',
									id: message.id,
									result: {
										structuredContent: {
											result: {
												greeting: 'Hello from execute',
											},
										},
									},
								},
								'*',
							)
							return
						}
					}

					if (message.method === 'ui/request-display-mode') {
						event.source.postMessage(
							{
								jsonrpc: '2.0',
								id: message.id,
								result: {
									mode:
										message.params?.mode === 'fullscreen'
											? 'fullscreen'
											: 'inline',
								},
							},
							'*',
						)
						return
					}

					if (message.method === 'ui/open-link') {
						if (typeof message.params?.url === 'string') {
							appendHostLink(frameId, message.params.url)
						}
						event.source.postMessage(
							{
								jsonrpc: '2.0',
								id: message.id,
								result: {},
							},
							'*',
						)
						return
					}

					if (message.method === 'ui/update-model-context') {
						event.source.postMessage(
							{
								jsonrpc: '2.0',
								id: message.id,
								result: {},
							},
							'*',
						)
					}
				})
			})()
		</script>
	</body>
</html>
