name: ✅ Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: >-
    validate-${{ github.event_name }}-${{ github.event.pull_request.number ||
    github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    name: 🧹 Lint
    timeout-minutes: 4
    if: >-
      github.event_name != 'pull_request' || github.event.pull_request.draft ==
      false
    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v6.0.2

      - name: 🟢 Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: 📥 Install Dependencies
        run: npm ci

      - name: 🧹 Lint
        run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    name: 🧪 Typecheck
    timeout-minutes: 4
    if: >-
      github.event_name != 'pull_request' || github.event.pull_request.draft ==
      false
    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v6.0.2

      - name: 🟢 Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: 📥 Install Dependencies
        run: npm ci

      - name: 🧪 Typecheck
        run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    name: ✅ Unit Tests
    timeout-minutes: 4
    if: >-
      github.event_name != 'pull_request' || github.event.pull_request.draft ==
      false
    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v6.0.2

      - name: 🟢 Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: 📥 Install Dependencies
        run: npm ci

      - name: ✅ Run Unit Tests
        run: npm run test

  e2e:
    runs-on: ubuntu-latest
    name: 🎭 E2E
    timeout-minutes: 12
    if: >-
      github.event_name != 'pull_request' || github.event.pull_request.draft ==
      false
    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v6.0.2

      - name: 🟢 Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: 🎭 Cache Playwright Browsers
        uses: actions/cache@v5.0.3
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: 📥 Install Dependencies
        run: npm ci

      - name: 📝 Prepare worker env
        run: cp packages/worker/.env.example packages/worker/.env

      - name: 🎭 Install Playwright Browsers
        run: npm run test:e2e:install

      - name: 🗄️ Apply D1 Migrations
        run: npm run migrate:local

      - name: 🧪 Playwright Tests
        run: npm run test:e2e:run

  mcp-e2e:
    runs-on: ubuntu-latest
    name: 🧩 MCP E2E
    timeout-minutes: 4
    if: >-
      github.event_name != 'pull_request' || github.event.pull_request.draft ==
      false
    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v6.0.2

      - name: 🟢 Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: 📥 Install Dependencies
        run: npm ci

      - name: 📝 Prepare worker env
        run: cp packages/worker/.env.example packages/worker/.env

      - name: 🗄️ Apply D1 Migrations
        run: npm run migrate:local

      - name: 🧩 MCP E2E Tests
        run: npm run test:mcp
