name: ✅ Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: >-
    validate-${{ github.event_name }}-${{ github.event.pull_request.number ||
    github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    name: 🧹 Lint
    timeout-minutes: 4
    if: >-
      github.event_name != 'pull_request' || github.event.pull_request.draft ==
      false
    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v6.0.2

      - name: 🧰 Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: 📥 Install Dependencies
        run: bun install --frozen-lockfile

      - name: 🧹 Lint
        run: bun run lint

  typecheck:
    runs-on: ubuntu-latest
    name: 🧪 Typecheck
    timeout-minutes: 4
    if: >-
      github.event_name != 'pull_request' || github.event.pull_request.draft ==
      false
    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v6.0.2

      - name: 🧰 Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: 📥 Install Dependencies
        run: bun install --frozen-lockfile

      - name: 🧪 Typecheck
        run: bun run typecheck

  test:
    runs-on: ubuntu-latest
    name: ✅ Bun Tests
    timeout-minutes: 4
    if: >-
      github.event_name != 'pull_request' || github.event.pull_request.draft ==
      false
    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v6.0.2

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 🧰 Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: 📥 Install Dependencies
        run: bun install --frozen-lockfile

      - name: ✅ Run Bun Tests
        run: npm run test

  e2e:
    runs-on: ubuntu-latest
    name: 🎭 E2E
    timeout-minutes: 4
    if: >-
      github.event_name != 'pull_request' || github.event.pull_request.draft ==
      false
    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v6.0.2

      - name: 🧰 Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: 🎭 Cache Playwright Browsers
        uses: actions/cache@v5.0.3
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: 📥 Install Dependencies
        run: bun install --frozen-lockfile

      - name: 🎭 Install Playwright Browsers
        run: bun run test:e2e:install

      - name: 🗄️ Apply D1 Migrations
        run: bun run migrate:local

      - name: 🧪 Playwright Tests
        run: bun run test:e2e

  mcp-e2e:
    runs-on: ubuntu-latest
    name: 🧩 MCP E2E
    timeout-minutes: 4
    if: >-
      github.event_name != 'pull_request' || github.event.pull_request.draft ==
      false
    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v6.0.2

      - name: 🧰 Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: 📥 Install Dependencies
        run: bun install --frozen-lockfile

      - name: 🗄️ Apply D1 Migrations
        run: bun run migrate:local

      - name: 🧩 MCP E2E Tests
        run: bun run test:mcp
