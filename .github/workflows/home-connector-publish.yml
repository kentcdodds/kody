name: 🐳 Publish Home Connector

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/home-connector-publish.yml'
      - 'packages/home-connector/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-home-connector
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    name: ✅ Test Home Connector
    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v6.0.2

      - name: 🧰 Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: 📥 Install Dependencies
        run: bun install --frozen-lockfile

      - name: ✅ Run Home Connector Tests
        run: bun run --cwd packages/home-connector test

  publish:
    runs-on: ubuntu-latest
    name: 🐳 Publish Docker image
    needs: test
    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v6.0.2

      - name: 🧾 Validate Docker Hub configuration
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          HOME_CONNECTOR_DOCKER_IMAGE: ${{ vars.HOME_CONNECTOR_DOCKER_IMAGE }}
        run: |
          set -euo pipefail

          if [ -z "${DOCKERHUB_USERNAME:-}" ]; then
            echo "Missing GitHub Actions secret DOCKERHUB_USERNAME." >&2
            exit 1
          fi

          if [ -z "${DOCKERHUB_TOKEN:-}" ]; then
            echo "Missing GitHub Actions secret DOCKERHUB_TOKEN." >&2
            exit 1
          fi

          if [ -z "${HOME_CONNECTOR_DOCKER_IMAGE:-}" ]; then
            echo "Missing GitHub Actions variable HOME_CONNECTOR_DOCKER_IMAGE." >&2
            echo "Expected a Docker Hub image name like <namespace>/kody-home-connector." >&2
            exit 1
          fi

      - name: 🏗️ Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏷️ Compute Docker tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.HOME_CONNECTOR_DOCKER_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short,prefix=sha-

      - name: 🚀 Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/home-connector/Dockerfile
          build-args: |
            APP_COMMIT_SHA=${{ github.sha }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
